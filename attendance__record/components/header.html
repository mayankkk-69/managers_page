<!-- ══════════════════════════════════════════════
     COMPONENT: header.html
     Matches the minimalist, non-sticky Travel Expense
     Approvals style header.
════════════════════════════════════════════════ -->
<header class="page-header" role="banner">

  <!-- Left: Page Title & Subtitle -->
  <div class="header-brand">
    <div class="header-brand-title">
      <h1>Attendance Record</h1>
      <p>Review and manage employee punch-in activity from your team.</p>
    </div>
  </div>

  <!-- Right: Minimal Actions -->
  <div class="header-actions">
    <!-- Export PDF Button -->
    <button class="btn-icon-minimal with-text" id="exportPdfBtn" title="Export PDF" aria-label="Export to PDF">
      <i data-feather="file-text" style="width:14px;height:14px;"></i>
      <span>Export PDF</span>
    </button>
    <!-- Minimal square refresh button matching the image -->
    <button class="btn-icon-minimal" id="headerRefreshBtn" title="Refresh" aria-label="Refresh">
      <i data-feather="refresh-cw" style="width:16px;height:16px;"></i>
    </button>
  </div>
</header>
